{% extends "base.html" %}
{% block title %}提交反馈 - {{ system_name }}{% endblock %}
{% block content %}
<div class="page-header">
    <div>
        <h1 class="h3 fw-bold">提交反馈</h1>
        <p class="text-secondary mb-0">满意度大于等于 3 分时，工单自动关闭；满意度小于 3 分时，工单自动重开。</p>
    </div>
    <a class="btn btn-outline-secondary" href="{{ url_for('main.ticket_detail', ticket_id=ticket.ticket_id) }}">返回工单详情</a>
</div>

<div class="row justify-content-center">
    <div class="col-xl-8">
        <div class="card border-0">
            <div class="card-body p-4">
                <form method="post">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">工单编号</label>
                            <input class="form-control" type="text" value="{{ ticket.ticket_id }}" readonly>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">满意度评分</label>
                            <select class="form-select" name="satisfaction_score" required>
                                <option value="">请选择评分</option>
                                {% for score in range(1, 6) %}
                                <option value="{{ score }}">{{ score }} 分</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-12">
                            <label class="form-label">反馈内容</label>
                            <textarea class="form-control" rows="6" name="feedback_content" placeholder="请模拟录入乘客反馈内容。" required></textarea>
                        </div>
                    </div>
                    <div class="note-panel mt-3">
                        如果反馈不满意，系统会自动将工单状态设置为“已重开”，便于继续处理和闭环复核。
                    </div>
                    <div class="mt-4 d-flex gap-2">
                        <button class="btn btn-success">提交反馈</button>
                        <a class="btn btn-outline-secondary" href="{{ url_for('main.ticket_detail', ticket_id=ticket.ticket_id) }}">取消</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
